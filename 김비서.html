<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김비서 - 주간보고 자동화</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 860px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; }
    header p { margin-top: 8px; color: #666; font-size: 14px; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 16px; font-weight: 600; color: #333;
      margin-bottom: 18px; padding-bottom: 10px;
      border-bottom: 2px solid #f0f2f5;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label { font-size: 13px; font-weight: 600; color: #444; }
    label span { font-weight: 400; color: #999; font-size: 12px; }

    input, textarea, select {
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: #333;
      transition: border-color 0.2s;
      outline: none;
      background: #fafafa;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #4f46e5;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; }

    .api-row { display: flex; gap: 10px; align-items: center; }
    .api-row input { flex: 1; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
    }

    .btn-save {
      background: #ecfdf5; color: #065f46;
      font-size: 13px; padding: 8px 14px;
    }
    .btn-save:hover { background: #d1fae5; }

    /* 메인 자동 생성 버튼 */
    .btn-auto {
      background: linear-gradient(135deg, #1877f2 0%, #4f46e5 100%);
      color: #fff; width: 100%; justify-content: center;
      font-size: 18px; padding: 18px; border-radius: 14px;
      box-shadow: 0 4px 16px rgba(79,70,229,0.3);
      letter-spacing: -0.3px;
    }
    .btn-auto:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.4); }
    .btn-auto:disabled { filter: none; transform: none; opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .btn-copy {
      background: #f0f2f5; color: #444;
      font-size: 14px; padding: 8px 16px;
    }
    .btn-copy:hover { background: #e2e8f0; }

    /* 진행 상태 표시 */
    .progress-bar {
      display: none;
      margin: 20px 0 0;
      background: #f0f2f5;
      border-radius: 12px;
      padding: 20px;
    }
    .progress-bar.visible { display: block; }

    .step-list { display: flex; flex-direction: column; gap: 12px; }

    .step {
      display: flex; align-items: center; gap: 12px;
      font-size: 14px; color: #999;
    }
    .step.active { color: #4f46e5; font-weight: 600; }
    .step.done { color: #059669; }
    .step.err { color: #dc2626; }

    .step-icon {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
      background: #e5e7eb; color: #9ca3af;
    }
    .step.active .step-icon {
      background: #e0e7ff; color: #4f46e5;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .step.done .step-icon { background: #d1fae5; color: #059669; }
    .step.err .step-icon { background: #fee2e2; color: #dc2626; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* 출력 */
    .output-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 2px solid #f0f2f5;
    }
    .output-header h2 { border: none; margin: 0; padding: 0; }

    #output-box {
      background: #f8f9fa;
      border: 1.5px solid #e9ecef;
      border-radius: 10px;
      padding: 20px;
      font-size: 14px;
      line-height: 1.9;
      white-space: pre-wrap;
      color: #222;
      min-height: 120px;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    /* 데이터 미리보기 */
    .data-preview {
      display: none;
      background: #f8faff;
      border: 1.5px solid #c7d7fe;
      border-radius: 10px;
      padding: 16px 20px;
      margin-top: 16px;
      font-size: 13px;
      line-height: 1.8;
      color: #374151;
    }
    .data-preview.visible { display: block; }
    .data-preview strong { color: #4f46e5; }

    .hint { font-size: 12px; color: #999; margin-top: 4px; }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a2e; color: #fff;
      padding: 10px 22px; border-radius: 100px;
      font-size: 14px; opacity: 0;
      transition: all 0.3s; pointer-events: none; z-index: 9999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .section-divider {
      text-align: center; font-size: 12px; color: #aaa;
      margin: 8px 0; position: relative;
    }
    .section-divider::before {
      content: ''; position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px; background: #e5e7eb; z-index: 0;
    }
    .section-divider span {
      background: #fff; padding: 0 10px; position: relative; z-index: 1;
    }

    .tag {
      display: inline-block;
      background: #e0e7ff; color: #4f46e5;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
      margin-left: 6px; vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>🤖 김비서</h1>
    <p>메타 광고 주간보고 자동 생성기 | 데이터 자동 수집 → 보고서 생성 one-click</p>
  </header>

  <!-- API 설정 -->
  <div class="card">
    <h2>🔑 API 설정</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Claude API 키</label>
        <div class="api-row">
          <input type="password" id="api-key" placeholder="sk-ant-api03-..." />
          <button class="btn btn-save" onclick="saveSettings()">저장</button>
        </div>
      </div>
      <div class="form-group">
        <label>Meta 액세스 토큰</label>
        <div class="api-row">
          <input type="password" id="meta-token" placeholder="EAAg..." />
        </div>
      </div>
    </div>
    <p class="hint" style="margin-top:10px;">🔒 모든 키는 브라우저 로컬에만 저장됩니다. 외부로 전송되지 않습니다.</p>
  </div>

  <!-- 광고 계정 설정 -->
  <div class="card">
    <h2>📘 광고 계정 <span class="tag">저장됨</span></h2>
    <div class="form-grid">
      <div class="form-group">
        <label>광고 계정 ID</label>
        <input type="text" id="meta-account" placeholder="act_1585007079431077" />
      </div>
      <div class="form-group">
        <label>브랜드명</label>
        <input type="text" id="meta-brand" placeholder="예: 온육집" />
      </div>
      <div class="form-group">
        <label>전주 CPA <span>(없으면 0 입력)</span></label>
        <input type="number" id="cpa-last" placeholder="예: 85407" />
      </div>
      <div class="form-group">
        <label>특이사항 / 운영 메모 <span>(선택)</span></label>
        <input type="text" id="notes" placeholder="예: 신규 소재 투입, CPC 편차 발생 등" />
      </div>
    </div>
    <button class="btn btn-save" onclick="saveSettings()" style="margin-top:14px;">💾 설정 저장</button>
  </div>

  <!-- 메인 버튼 -->
  <button class="btn btn-auto" id="main-btn" onclick="runAll()">
    🚀 전주 데이터 가져오고 보고서 자동 생성
  </button>

  <!-- 진행 상태 -->
  <div class="progress-bar" id="progress-bar">
    <div class="step-list">
      <div class="step" id="step-1">
        <div class="step-icon">1</div>
        <span>Meta API에서 전주 광고 데이터 수집 중...</span>
      </div>
      <div class="step" id="step-2">
        <div class="step-icon">2</div>
        <span>베스트 소재 분석 중...</span>
      </div>
      <div class="step" id="step-3">
        <div class="step-icon">3</div>
        <span>김비서가 보고서 작성 중...</span>
      </div>
    </div>

    <!-- 수집된 데이터 미리보기 -->
    <div class="data-preview" id="data-preview"></div>
  </div>

  <!-- 출력 -->
  <div class="card" style="margin-top: 20px;">
    <div class="output-header">
      <h2>📨 생성된 보고서</h2>
      <button class="btn btn-copy" onclick="copyOutput()">📋 복사</button>
    </div>
    <div id="output-box">버튼을 누르면 Meta 데이터를 자동으로 가져와 보고서를 작성합니다.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SYSTEM_PROMPT = `당신은 김비서입니다. 매주 월요일, 전주 메타 광고 운영 데이터를 분석하고 카카오톡 보고용 메시지를 작성하는 광고 운영 보고 전문 AI 비서입니다.

아래 규칙에 따라 보고서를 작성하세요.

## 전체 구조
[{브랜드명} 전주 광고데이터 공유]

{인사말 한 줄}

📊 전주 데이터 (*{기간})
- DB : {건수}건
- 지출 비용 : {비용}원
- CPA (전환당 비용) : {CPA}원 (전주 {전주CPA}원)
- CTR (클릭률) : {CTR}%

🔍 운영 인사이트
① {인사이트1 - 성과 좋은 소재/소구점 이유 분석}
② {인사이트2 - 신규 소재 또는 변화 요인}
③ {인사이트3 - 개선 필요 지표 + 대응 방향}

🔥 베스트 소재
소재 : {소재명}
메인 카피 : "{카피}" (카피가 있을 경우에만)
> {소재 효과 해석 - 예비창업자 심리와 연결}

🚀 향후 운영 방향
① {효율 지표 중심 예산 운영 전략}
② {소재 확장 또는 최적화 계획}

## 작성 규칙
- 경어체 유지 (~드립니다, ~하겠습니다)
- 전문 용어는 괄호로 풀어서 병기: CPA (전환당 비용), CTR (클릭률), CPC (클릭당 비용)
- 이모지는 섹션 헤더에만 사용
- 광고 성과를 예비창업자 관점에서 해석 (심리적 장벽, 신뢰도, 운영 편의성)
- 숫자는 천 단위 콤마 포함하여 표기 (예: 690,804원)
- 전주 CPA가 0이면 "전주 데이터 없음"으로 표기
- CPA 전주 대비 개선 시 → 소재 효율 강조 / 상승 시 → 신규 소재 학습 기간 또는 테스트 성과로 해석
- 인사이트는 현상 + 해석 구조로 2~3문장 이내
- 마크다운 없이 순수 텍스트로만 출력 (**, ## 등 사용 금지)`;

  // ── 저장된 설정 불러오기 ──
  window.onload = () => {
    const fields = ['api-key', 'meta-token', 'meta-account', 'meta-brand', 'cpa-last', 'notes'];
    fields.forEach(id => {
      const val = localStorage.getItem('kimbi_' + id);
      if (val) document.getElementById(id).value = val;
    });

    // 계정 ID 저장 여부에 따라 tag 업데이트
    const saved = localStorage.getItem('kimbi_meta-account');
    if (saved) {
      document.querySelector('.tag').textContent = '저장됨 ✓';
    }
  };

  function saveSettings() {
    const fields = ['api-key', 'meta-token', 'meta-account', 'meta-brand', 'cpa-last', 'notes'];
    fields.forEach(id => {
      const val = document.getElementById(id).value.trim();
      if (val) localStorage.setItem('kimbi_' + id, val);
    });
    document.querySelector('.tag').textContent = '저장됨 ✓';
    showToast('✅ 설정이 저장되었습니다.');
  }

  // ── 날짜 계산 (전주 월~일) ──
  function getLastWeekRange() {
    const today = new Date();
    const dayOfWeek = today.getDay();
    const daysBack = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const thisMonday = new Date(today);
    thisMonday.setDate(today.getDate() - daysBack);
    const lastMonday = new Date(thisMonday);
    lastMonday.setDate(thisMonday.getDate() - 7);
    const lastSunday = new Date(lastMonday);
    lastSunday.setDate(lastMonday.getDate() + 6);
    const prevMonday = new Date(lastMonday);
    prevMonday.setDate(lastMonday.getDate() - 7);
    const prevSunday = new Date(lastSunday);
    prevSunday.setDate(lastSunday.getDate() - 7);
    const fmt = d => d.toISOString().split('T')[0];
    const display = d => `${d.getMonth()+1}/${d.getDate()}`;
    return {
      since: fmt(lastMonday), until: fmt(lastSunday),
      prevSince: fmt(prevMonday), prevUntil: fmt(prevSunday),
      label: `${display(lastMonday)}~${display(lastSunday)}`
    };
  }

  function setStep(n, state) {
    const el = document.getElementById('step-' + n);
    el.className = 'step ' + state;
    const icons = { active: '⟳', done: '✓', err: '✕' };
    el.querySelector('.step-icon').textContent = icons[state] || n;
  }

  // ── 전환(리드) 건수 추출 ──
  function getLeads(d) {
    const acts = d?.actions || [];
    const leadTypes = ['lead', 'offsite_conversion.fb_pixel_lead', 'onsite_conversion.lead_grouped'];
    return acts.filter(a => leadTypes.includes(a.action_type)).reduce((s, a) => s + Number(a.value), 0);
  }

  // ── 메인: Meta 데이터 가져오기 + 보고서 생성 ──
  async function runAll() {
    const apiKey  = document.getElementById('api-key').value.trim();
    const token   = document.getElementById('meta-token').value.trim();
    const account = document.getElementById('meta-account').value.trim();
    const brand   = document.getElementById('meta-brand').value.trim();
    const cpaLast = document.getElementById('cpa-last').value.trim();
    const notes   = document.getElementById('notes').value.trim();

    if (!apiKey) { showToast('Claude API 키를 입력해주세요.'); return; }
    if (!token)  { showToast('Meta 액세스 토큰을 입력해주세요.'); return; }
    if (!account){ showToast('광고 계정 ID를 입력해주세요.'); return; }
    if (!brand)  { showToast('브랜드명을 입력해주세요.'); return; }

    const btn = document.getElementById('main-btn');
    const box = document.getElementById('output-box');
    const progress = document.getElementById('progress-bar');
    const preview = document.getElementById('data-preview');

    btn.disabled = true;
    btn.textContent = '처리 중...';
    progress.classList.add('visible');
    preview.classList.remove('visible');
    box.textContent = '처리 중입니다...';

    // step 초기화
    [1,2,3].forEach(n => {
      const el = document.getElementById('step-' + n);
      el.className = 'step';
      el.querySelector('.step-icon').textContent = n;
    });

    try {
      // ── STEP 1: 계정 레벨 인사이트 ──
      setStep(1, 'active');
      const { since, until, prevSince, prevUntil, label } = getLastWeekRange();
      const BASE = 'https://graph.facebook.com/v19.0';
      const fields = 'spend,actions,ctr,clicks,impressions,cpc';

      const [thisWeek, prevWeek] = await Promise.all([
        fetch(`${BASE}/${account}/insights?fields=${fields}&time_range={"since":"${since}","until":"${until}"}&access_token=${token}`).then(r => r.json()),
        fetch(`${BASE}/${account}/insights?fields=${fields}&time_range={"since":"${prevSince}","until":"${prevUntil}"}&access_token=${token}`).then(r => r.json()),
      ]);

      if (thisWeek.error) throw new Error('Meta API 오류: ' + thisWeek.error.message);

      const w = thisWeek.data?.[0] || {};
      const p = prevWeek.data?.[0] || {};

      const db       = getLeads(w);
      const spend    = Math.round(Number(w.spend || 0));
      const cpa      = db > 0 ? Math.round(spend / db) : 0;
      const ctr      = Number(w.ctr || 0).toFixed(2);
      const cpc      = Math.round(Number(w.cpc || 0));
      const prevDb   = getLeads(p);
      const prevSpend = Math.round(Number(p.spend || 0));
      // 전주 CPA: 직접 입력값 우선, 없으면 API에서 계산
      const prevCpa = cpaLast ? Number(cpaLast) : (prevDb > 0 ? Math.round(prevSpend / prevDb) : 0);

      setStep(1, 'done');

      // ── STEP 2: 광고 레벨 인사이트 (베스트 소재) ──
      setStep(2, 'active');

      const adsRes = await fetch(
        `${BASE}/${account}/insights?fields=ad_name,adset_name,spend,actions,ctr,cpc&level=ad&time_range={"since":"${since}","until":"${until}"}&sort=["spend_descending"]&limit=10&access_token=${token}`
      ).then(r => r.json());

      let bestAdName = '';
      let bestAdLeads = 0;
      let adInsights = [];

      if (!adsRes.error && adsRes.data?.length > 0) {
        const sortedAds = adsRes.data.sort((a, b) => getLeads(b) - getLeads(a));
        const best = sortedAds[0];
        bestAdName  = best.ad_name || '';
        bestAdLeads = getLeads(best);

        // 상위 3개 소재 인사이트
        adInsights = sortedAds.slice(0, 3).map(ad => ({
          name: ad.ad_name,
          leads: getLeads(ad),
          spend: Math.round(Number(ad.spend || 0)),
          ctr: Number(ad.ctr || 0).toFixed(2),
          cpc: Math.round(Number(ad.cpc || 0)),
        }));
      }

      setStep(2, 'done');

      // 데이터 미리보기 표시
      preview.innerHTML = `<strong>📊 수집된 데이터 (${label})</strong><br>
지출: ${spend.toLocaleString()}원 | DB: ${db}건 | CPA: ${cpa.toLocaleString()}원 | CTR: ${ctr}% | CPC: ${cpc.toLocaleString()}원<br>
베스트 소재: ${bestAdName || '없음'} (DB ${bestAdLeads}건)`;
      preview.classList.add('visible');

      // ── STEP 3: Claude 보고서 생성 ──
      setStep(3, 'active');

      const adInsightText = adInsights.length > 0
        ? `\n\n상위 소재 데이터:\n` + adInsights.map((a, i) =>
            `${i+1}. ${a.name} - DB ${a.leads}건, 지출 ${a.spend.toLocaleString()}원, CTR ${a.ctr}%, CPC ${a.cpc.toLocaleString()}원`
          ).join('\n')
        : '';

      const userMessage = `김비서, 이번 주 보고서 작성해줘.

브랜드: ${brand}
기간: ${label}
DB: ${db}건
지출: ${spend.toLocaleString()}원
이번주 CPA: ${cpa.toLocaleString()}원
전주 CPA: ${prevCpa > 0 ? prevCpa.toLocaleString() + '원' : '없음 (첫 주)'}
CTR: ${ctr}%
CPC: ${cpc.toLocaleString()}원
베스트 소재: ${bestAdName || '데이터 없음'}
특이사항: ${notes || '없음'}${adInsightText}`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-6',
          max_tokens: 2048,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: userMessage }]
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error('Claude API 오류: ' + (err.error?.message || `HTTP ${res.status}`));
      }

      const data = await res.json();
      const text = data.content?.[0]?.text || '응답을 받지 못했습니다.';

      setStep(3, 'done');
      box.textContent = text;

    } catch (e) {
      // 어떤 step에서 실패했는지 표시
      [1,2,3].forEach(n => {
        if (document.getElementById('step-' + n).className.includes('active')) {
          setStep(n, 'err');
        }
      });
      box.textContent = '❌ 오류가 발생했습니다:\n' + e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = '🚀 전주 데이터 가져오고 보고서 자동 생성';
    }
  }

  function copyOutput() {
    const text = document.getElementById('output-box').textContent;
    if (text.startsWith('버튼을') || text.startsWith('처리') || text.startsWith('❌')) {
      showToast('복사할 보고서가 없습니다.');
      return;
    }
    navigator.clipboard.writeText(text).then(() => showToast('📋 클립보드에 복사되었습니다!'));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
